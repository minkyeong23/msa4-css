<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./14.css">
  <title>혼</title>
</head>
<body>
  <form action="">
    <fieldset>
      
      <legend class="i">I want you!</legend>
      <label for="id" class="red">이름</label>
      <input type="text" name="id" id="id" required class="focus">
      <br>
      <label for="age" class="red">나이</label>
      <input type="number" name="age" id="age" min="20" class="focus" required>
      <br>
      <label for="gender" class="red">성별</label>

      <input type="radio" name="gender" id="gender" class="focus">
      <label for="gender">남자</label>
      <input type="radio" name="gender" id="gender" class="focus">
      <label for="gender">여자</label>
      <br>

      <label for="require" class="re">요청사항</label>
      <textarea name="require" id="require" cols="30" rows="10" placeholder="요청 사항 영역" class="focus"></textarea>
      <br>
      
      <button type="submit">보내기</button>
     
    </fieldset>
  </form>
</body>
</html>
