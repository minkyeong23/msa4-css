<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./01.css">
  <title>01_style sheet</title>
  <style>
    h2 {
      color: violet;
    }
  </style>
</head>
<body>
  
  <!-- 인라인 스타일 : html 요소에 `style속성` 이라는 요소를 직접 스타일을 적용 -->
  <h1 style="color: blue">안녕 css</h1>
  
  <!-- 내부 스타일 : `head 태그`에 `style tag` 를 사용하여 스타일을 적용 -->
  <h2>내부 스타일</h2>

  <!-- 외부 스타일 : 별도의 css 파일을 작성하고, head 태그에 link 태그를 사용해서 style을 적용 -->
  <h3>외부 스타일</h3>

</body>
</html>
